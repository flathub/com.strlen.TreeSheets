id: com.strlen.TreeSheets
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: TreeSheets
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=host
build-options:
  no-debuginfo: true
modules:
  - name: TreeSheets
    buildsystem: simple
    builddir: true
    build-commands:
      - |
        TS_VERSION=$(git describe --tags --abbrev=0)
        cmake -S . -B _build \
          -DCMAKE_BUILD_TYPE=Release \
          -DTREESHEETS_VERSION=$TS_VERSION \
          -DFETCHCONTENT_SOURCE_DIR_WXWIDGETS=thirdparty/wxWidgets \
          -DFETCHCONTENT_SOURCE_DIR_LOBSTER=thirdparty/lobster \
          -DwxBUILD_INSTALL=OFF \
          -DwxBUILD_SHARED=OFF \
          -DCMAKE_INSTALL_PREFIX=/app
      - cmake --build _build -j4
      - cmake --install _build
    sources:
      - type: git
        url: https://github.com/aardappel/treesheets
        commit: 2c9c424dc070b54cd13ed4a46f5bed78d521084b
        tag: '3188'
        x-checker-data:
          type: json
          url: https://api.github.com/repos/aardappel/treesheets/releases/latest
          tag-query: .tag_name
          version-query: $tag
          timestamp-query: .published_at
      - type: git
        url: https://github.com/wxWidgets/wxWidgets
        commit: db1005db3dea2c37a46fb455a9a02e37aa360751
        tag: v3.3.2
        dest: thirdparty/wxWidgets
      - type: git
        url: https://github.com/aardappel/lobster
        commit: a24fce44e4c2cf77ef952d22be8deb6be8b35cff
        tag: v2026.2
        dest: thirdparty/lobster
