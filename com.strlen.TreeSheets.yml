id: com.strlen.TreeSheets
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: TreeSheets
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=host
build-options:
  no-debuginfo: true
modules:
  - name: TreeSheets
    buildsystem: simple
    builddir: true
    build-commands:
      - |
        TS_VERSION=$(git describe --tags --abbrev=0)
        cmake -S . -B _build \
          -DCMAKE_BUILD_TYPE=Release \
          -DTREESHEETS_VERSION=$TS_VERSION \
          -DFETCHCONTENT_SOURCE_DIR_WXWIDGETS=thirdparty/wxWidgets \
          -DFETCHCONTENT_SOURCE_DIR_LOBSTER=thirdparty/lobster \
          -DwxBUILD_INSTALL=OFF \
          -DwxBUILD_SHARED=OFF \
          -DCMAKE_INSTALL_PREFIX=/app
      - cmake --build _build -j4
      - cmake --install _build
    sources:
      - type: git
        url: https://github.com/aardappel/treesheets
        commit: f95b6f10764f24f1f1d9ae1979a40aef894107a4
        tag: '3262'
        x-checker-data:
          type: json
          url: https://api.github.com/repos/aardappel/treesheets/releases/latest
          tag-query: .tag_name
          version-query: $tag
          timestamp-query: .published_at
      - type: archive
        url: https://github.com/wxWidgets/wxWidgets/releases/download/v3.3.3/wxWidgets-3.3.3.tar.bz2
        sha256: 81b09d6dd9f1ed9301f8c55a968a488d0491f264dc2bab19a7e407ac67009482
        dest: thirdparty/wxWidgets
      - type: archive
        url: https://github.com/aardappel/lobster/archive/refs/tags/v2026.4.tar.gz
        sha256: db430e0310adddb5667648597b56efc2c198659626f92805b2e4f35932f88d8f
        dest: thirdparty/lobster
